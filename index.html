<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Doação de Sangue</title>
</head>

<body>

    <header>
        <nav>

            <h1>Cadastro de Doadores de Sangue</h1>

        </nav>
    </header>

    <form id="formulario_sangue">

        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <br>


        <label for="email">Email:</label>
        <input type="text" id="email" placeholder="Digite seu email">
        <br>

    
         <label for="idade">Idade:</label>
        <input type="text" id="idade" placeholder="Digite sua idade">
        <br>


        <label for="peso">Peso:</label>
        <input type="text" id="peso" placeholder="Digite seu peso">
        <br>


        <label for="tipo_sangue">Tipo sanguíneo:</label>
        <select name="tipo_sangue" id="tipo_sangue">
            <option value=""> Selecione</option>
            <option value="a+">A+</option>
            <option value="a-">A-</option>
            <option value="b+">B+</option>
            <option value="b-">B-</option>
            <option value="ab+">AB+</option>
            <option value="ab-">AB-</option>
            <option value="o+">O+</option>
            <option value="o-">O-</option>
        </select>
        <br>


        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" placeholder="Digite seu telefone">
        <br>


        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Digite sua cidade">
        <br>


         <label for="estado">Estado:</label>
        <input type="text" id="idade" placeholder="Digite seu estado">
        <br>


        
        <button type="submit" id="finalizar_cadastro">Enviar</button>

    </form>

    <script src="script.js"></script>


</body>

</html>
